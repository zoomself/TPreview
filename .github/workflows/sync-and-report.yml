name: Sync Baostock and publish report

on:
  workflow_dispatch:
  schedule:
    # ~17:30 Beijing (Asia/Shanghai); data availability varies — adjust if needed.
    - cron: "30 9 * * *"

permissions:
  contents: write

concurrency:
  group: baostock-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure config.yaml exists
        shell: bash
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
          fi

      - name: Sync market data
        run: python -m src.sync

      - name: Build Pages report
        run: python -m src.report

      - name: Commit data and docs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --staged --quiet; then
            echo "No data or report changes to commit."
          else
            git commit -m "chore: sync Baostock data and refresh report [skip ci]"
            git push
          fi
